name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: write
  attestations: write
  id-token: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: '0'

      - name: Bump version and push tag
        id: auto_tag
        if: github.ref == 'refs/heads/main'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Determine Version
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ steps.auto_tag.outputs.new_tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
          echo "VERSION=${TAG:-dev}" >> $GITHUB_ENV

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.22.x"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Release guard
        if: steps.get_version.outputs.tag != ''
        run: |
          chmod +x scripts/ci_guard.sh scripts/secret_scan.sh
          scripts/ci_guard.sh release "${RELEASE_TAG}"

      - name: Build release binaries
        if: steps.get_version.outputs.tag != ''
        run: |
          chmod +x scripts/build_release.sh
          ./scripts/build_release.sh

      - name: Generate checksums
        if: steps.get_version.outputs.tag != ''
        run: sha256sum nasbot nasbot-arm64 > SHA256SUMS.txt

      - name: Attest build provenance
        if: steps.get_version.outputs.tag != ''
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            nasbot
            nasbot-arm64
            SHA256SUMS.txt

      - name: Publish GitHub Release
        if: steps.get_version.outputs.tag != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          generate_release_notes: true
          files: |
            nasbot
            nasbot-arm64
            SHA256SUMS.txt

      - name: Log in to the Container registry
        if: steps.get_version.outputs.tag != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        if: steps.get_version.outputs.tag != ''
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.get_version.outputs.tag != ''
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        if: steps.get_version.outputs.tag != ''
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.get_version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.get_version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        if: steps.get_version.outputs.tag != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
