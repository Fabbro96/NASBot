name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: write
  attestations: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Bump version and push tag
        id: auto_tag
        if: github.ref == 'refs/heads/main'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Determine Version
        id: get_version
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "VERSION=${{ steps.auto_tag.outputs.new_tag }}" >> $GITHUB_ENV
            echo "RELEASE_TAG=${{ steps.auto_tag.outputs.new_tag }}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Release guard
        run: |
          chmod +x scripts/ci_guard.sh scripts/secret_scan.sh
          scripts/ci_guard.sh release "${RELEASE_TAG}"

      - name: Build release binaries
        run: |
          chmod +x scripts/build_release.sh
          ./scripts/build_release.sh

      - name: Generate checksums
        run: sha256sum nasbot nasbot-arm64 > SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            nasbot
            nasbot-arm64
            SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            nasbot
            nasbot-arm64
            SHA256SUMS.txt
